<!DOCTYPE html>
<html>
<head>
<title>My Links</title>
    
<script src="https://telegram.org/js/telegram-web-app.js"></script>
    
<style>

body{
    background:#0f172a;
    font-family: Arial;
    text-align:center;
    color:white;
}

.profile{
    margin-top:40px;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid white;
}

h2{
    margin-top:10px;
}

.link{
    display:block;
    background:#1e293b;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:15px auto;
    width:300px;
    border-radius:10px;
    font-size:18px;
    transition:0.3s;
}

.link:hover{
    background:#38bdf8;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="profile">

<img src="profile.jpg">

<h2>Your Name</h2>
<p>Welcome to my links</p>

</div>

<a class="link" href="https://jackbit.com/en/">Facebook</a>

<a class="link" href="https://codetester.io/" target="_blank>YouTube</a>

<a class="link" href="#">Telegram</a>

<a class="link" href="#">My Website</a>

</body>

    
<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Full View Mini App
</script>

</html>
